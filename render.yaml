# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Provisions everything Collably needs in one shot:
#   1. PostgreSQL database
#   2. Express + Socket.io API (Node web service)
#   3. React/Vite frontend (static site)
#
# After Render creates the services on the first deploy, set these two env
# vars manually in the dashboard (they're cross-referenced and Render can't
# resolve them automatically because we need the `https://` prefix):
#
#   collably-api    CLIENT_ORIGIN  =  https://<your-client-host>.onrender.com
#   collably-client VITE_API_URL   =  https://<your-api-host>.onrender.com
#
# Both `sync: false` env vars below are intentionally placeholders.

databases:
  - name: collably-db
    plan: free
    databaseName: collably
    user: collably

services:
  # --- API (Node + Express + Socket.io) -------------------------------------
  - type: web
    runtime: node
    name: collably-api
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: collably-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_ORIGIN
        sync: false  # set in dashboard after first deploy

  # --- Frontend (React + Vite) ---------------------------------------------
  - type: web
    runtime: static
    name: collably-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    routes:
      # SPA client-side routing: serve index.html for any unknown path so
      # /dashboard, /campaigns/123 etc. don't 404 on hard refresh.
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # set in dashboard after first deploy
